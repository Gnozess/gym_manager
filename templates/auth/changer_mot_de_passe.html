{% extends 'base.html' %}
{% block title %}Changer le mot de passe{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white">
                <h5 class="mb-0">🔒 Changer le mot de passe</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Ancien mot de passe</label>
                        <input type="password" name="ancien_mot_de_passe"
                               class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nouveau mot de passe</label>
                        <input type="password" name="nouveau_mot_de_passe"
                               class="form-control" id="nouveau" required
                               minlength="6">
                        <small class="text-muted">Minimum 6 caracteres.</small>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Confirmer le nouveau mot de passe</label>
                        <input type="password" name="confirmation"
                               class="form-control" id="confirmation" required>
                        <div id="msg_confirmation" class="small mt-1"></div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-dark">
                            Enregistrer
                        </button>
                        <a href="{{ url_for('membres.dashboard') }}"
                           class="btn btn-outline-secondary">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Verification en temps reel de la confirmation
document.getElementById('confirmation').addEventListener('input', function() {
    const nouveau = document.getElementById('nouveau').value;
    const msg = document.getElementById('msg_confirmation');
    if (this.value === nouveau) {
        msg.innerHTML = '<span class="text-success">✅ Les mots de passe correspondent.</span>';
    } else {
        msg.innerHTML = '<span class="text-danger">❌ Les mots de passe ne correspondent pas.</span>';
    }
});
</script>
{% endblock %}
