{% extends 'base.html' %}
{% block title %}Modifier un membre{% endblock %}

{% block content %}
<h2 class="mb-4">✏️ Modifier un membre</h2>
<div class="card p-4 shadow-sm" style="max-width: 600px;">
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Prénom</label>
            <input type="text" name="prenom" class="form-control" value="{{ membre.prenom }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Nom</label>
            <input type="text" name="nom" class="form-control" value="{{ membre.nom }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" value="{{ membre.email }}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Téléphone</label>
            <input type="text" name="telephone" class="form-control" value="{{ membre.telephone or '' }}">
        </div>
        <div class="mb-3 form-check">
            <input type="checkbox" name="actif" class="form-check-input" id="actif" {{ 'checked' if membre.actif }}>
            <label class="form-check-label" for="actif">Membre actif</label>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-dark">Enregistrer</button>
            <a href="{{ url_for('membres.liste') }}" class="btn btn-outline-secondary">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
